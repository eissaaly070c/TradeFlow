<html lang="ar" dir="rtl">

    <style>
        :root {
            --gold: #D4A843;
            --gold-light: #F0C96A;
            --dark: #0A0E1A;
            --dark2: #111827;
            --dark3: #1C2438;
            --dark4: #243044;
            --text: #E8EDF5;
            --text-muted: #7A8BA8;
            --green: #22C997;
            --red: #FF5B6B;
            --blue: #4A9EFF;
            --border: rgba(212,168,67,0.2);
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            background: var(--dark);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* خلفية متدرجة احترافية */
        body::before {
            content:'';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% -20%, var(--dark3), var(--dark));
            z-index: -1;
        }
    </style>
